modules:
  jira:adminPage:
    - key: melduoapp-hello-world-admin-page
      resource: main
      resolver:
        function: resolver
      render: native
      title: melduoapp (Admin)

  jira:projectPage:
    - key: melduoapp-hello-world-project-page
      resource: main
      resolver:
        function: resolver
      render: native
      title: melduoapp

  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main
    path: src/frontend/index.jsx

permissions:
  scopes:
    - read:jira-work
    - write:jira-work

app:
  runtime:
    name: nodejs22.x
    memoryMB: 256
    architecture: arm64
  id: ari:cloud:ecosystem::app/d1584992-2741-41e6-a219-9a90f0344c32
